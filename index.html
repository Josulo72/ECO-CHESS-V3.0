<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#020617"/>
<title>ECO v3.0 ♟️</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♟️</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020617;font-family:'Outfit',sans-serif;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
.hidden{display:none!important}

/* ANIMATIONS */
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes heartFloat{0%{transform:translateY(0) rotate(var(--r,0deg));opacity:1}100%{transform:translateY(-110vh) rotate(calc(var(--r,0deg) + 200deg));opacity:0}}
@keyframes lovePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes eco-rotate{
  0%{transform:rotateY(-28deg) rotateX(14deg)}
  25%{transform:rotateY(6deg) rotateX(-5deg)}
  50%{transform:rotateY(28deg) rotateX(12deg)}
  75%{transform:rotateY(4deg) rotateX(-3deg)}
  100%{transform:rotateY(-28deg) rotateX(14deg)}}

/* LOGIN */
#login{min-height:100vh;display:flex;justify-content:center;align-items:center;
  background:radial-gradient(ellipse at 30% 40%,rgba(56,189,248,.07) 0%,transparent 55%),
  radial-gradient(ellipse at 70% 70%,rgba(244,114,182,.04) 0%,transparent 50%)}
.login-card{text-align:center;padding:40px 32px 28px;background:rgba(15,23,42,.9);
  border-radius:28px;border:1px solid rgba(56,189,248,.15);backdrop-filter:blur(24px);
  width:92%;max-width:400px;animation:fadeInUp .8s ease-out;
  box-shadow:0 0 80px rgba(56,189,248,.06),0 40px 80px rgba(0,0,0,.5)}
.logo-wrap{perspective:500px;display:flex;justify-content:center;margin-bottom:4px}
.logo-eco{display:inline-block;font-family:'Space Mono',monospace;font-size:5.5rem;font-weight:700;
  letter-spacing:22px;padding-right:22px;color:#bae6fd;animation:eco-rotate 10s ease-in-out infinite;
  text-shadow:0 0 30px rgba(56,189,248,1),0 0 70px rgba(56,189,248,.6),
    1px 1px 0 #40aad8,2px 2px 0 #3596c5,3px 3px 0 #2a82b2,4px 4px 0 #1f6e9f,
    5px 5px 0 #145a8c,6px 6px 0 #094679,7px 7px 0 #033266,8px 8px 0 #001e53,
    9px 9px 14px rgba(0,0,30,.9)}
.tagline{color:#475569;letter-spacing:6px;font-size:.7rem;margin:4px 0 4px;text-transform:uppercase;font-weight:600}
.version{display:inline-block;font-family:'Space Mono',monospace;font-size:.58rem;color:#38bdf8;
  border:1px solid rgba(56,189,248,.3);padding:2px 10px;border-radius:20px;margin-bottom:22px;letter-spacing:2px}
.section-label{font-size:.58rem;letter-spacing:3px;color:#475569;text-transform:uppercase;margin-bottom:7px;text-align:left}
.login-input{width:100%;padding:13px 16px;margin-bottom:4px;border-radius:14px;
  border:1px solid rgba(56,189,248,.18);background:rgba(2,6,23,.7);color:#e2e8f0;
  text-align:center;font-size:1rem;font-family:'Outfit',sans-serif;outline:none;transition:border-color .3s}
.login-input:focus{border-color:rgba(56,189,248,.5)}
.diff-row{display:flex;gap:5px;margin:16px 0 18px}
.diff-card{flex:1;padding:9px 3px 7px;border-radius:11px;border:1px solid rgba(56,189,248,.08);
  background:rgba(2,6,23,.5);cursor:pointer;text-align:center;transition:all .22s}
.diff-card.active{border-color:#38bdf8;background:rgba(56,189,248,.12)}
.diff-card .di{font-size:1.25rem;line-height:1;margin-bottom:3px}
.diff-card .dn{font-size:.55rem;color:#64748b;letter-spacing:1px;text-transform:uppercase;font-weight:600}
.diff-card.active .dn{color:#38bdf8}
.btn-enter{background:linear-gradient(135deg,#38bdf8,#0ea5e9);border:none;padding:14px 30px;
  border-radius:14px;font-weight:700;cursor:pointer;width:100%;color:#020617;font-size:1rem;
  font-family:'Outfit',sans-serif;box-shadow:0 4px 24px rgba(56,189,248,.35);transition:transform .2s}
.btn-enter:active{transform:scale(.97)}
.btn-eco{width:100%;margin-top:12px;padding:12px;border-radius:14px;
  background:linear-gradient(135deg,rgba(244,114,182,.12),rgba(244,114,182,.06));
  border:1px solid rgba(244,114,182,.3);cursor:pointer;font-family:'Space Mono',monospace;
  font-size:.76rem;color:#f472b6;letter-spacing:2px;transition:all .3s;animation:lovePulse 3s ease-in-out infinite}
.hint-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:8px}
.hint{font-size:.65rem;color:#334155;font-style:italic}
.learn-link{font-size:.68rem;color:#38bdf8;cursor:pointer;border:1px solid rgba(56,189,248,.3);
  padding:4px 10px;border-radius:7px;transition:all .2s;font-family:'Space Mono',monospace;white-space:nowrap}

/* GAME */
#game{display:none;min-height:100vh;padding:10px;
  background:radial-gradient(ellipse at 30% 50%,rgba(56,189,248,.04) 0%,transparent 50%)}
.layout{display:flex;gap:16px;max-width:1100px;margin:0 auto;padding-top:8px}
.board-col{flex:2;display:flex;flex-direction:column;align-items:center;gap:5px}
.timer{font-family:'Space Mono',monospace;font-size:1.7rem;padding:4px 18px;border-radius:12px;
  background:rgba(15,23,42,.8);display:flex;align-items:center;gap:8px}
.timer span{font-size:.58rem;opacity:.5;letter-spacing:3px}
.t-black{color:#f472b6;border:1px solid rgba(244,114,182,.2)}
.t-white{color:#38bdf8;border:1px solid rgba(56,189,248,.2)}
.t-active{animation:blink 1.5s ease-in-out infinite}
.status{min-height:26px;color:#94a3b8;font-style:italic;font-size:.87rem;text-align:center}
.controls{display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:center}
.view-toggle{display:flex;background:rgba(15,23,42,.8);border:1px solid rgba(30,41,59,.8);border-radius:10px;overflow:hidden}
.vbtn{padding:6px 14px;cursor:pointer;font-family:'Space Mono',monospace;font-size:.68rem;
  color:#64748b;background:transparent;border:none;transition:all .2s;letter-spacing:1px}
.vbtn.active{background:rgba(56,189,248,.15);color:#38bdf8}
.ctrl-btn{padding:6px 12px;cursor:pointer;font-family:'Space Mono',monospace;font-size:.68rem;
  color:#64748b;background:rgba(15,23,42,.8);border:1px solid rgba(30,41,59,.8);border-radius:9px;transition:all .2s}
.ctrl-btn.pink{color:#f472b6;border-color:rgba(244,114,182,.25);background:rgba(244,114,182,.08);animation:lovePulse 3s ease-in-out infinite}
.diff-badge{padding:4px 10px;font-size:.58rem;font-family:'Space Mono',monospace;
  letter-spacing:1px;color:#64748b;background:rgba(15,23,42,.6);border:1px solid rgba(30,41,59,.6);border-radius:8px}

/* BOARD
