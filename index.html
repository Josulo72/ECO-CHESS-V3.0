<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#020617"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>ECO v3.0 ♟️</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♟️</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--sky:#38bdf8;--pink:#f472b6;--bg:#020617;--card:#0f172a;--border:rgba(56,189,248,0.15)}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:#e2e8f0;overflow-x:hidden;min-height:100vh}

@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 30px rgba(56,189,248,0.12)}50%{box-shadow:0 0 60px rgba(56,189,248,0.28)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}
@keyframes heartFloat{0%{transform:translateY(0) scale(1) rotate(var(--rot,0deg));opacity:1}100%{transform:translateY(-105vh) scale(0.4) rotate(calc(var(--rot,0deg) + 180deg));opacity:0}}
@keyframes lovePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes eco-rotate{
  0%{transform:rotateY(-28deg) rotateX(14deg)}
  25%{transform:rotateY(6deg) rotateX(-5deg)}
  50%{transform:rotateY(28deg) rotateX(12deg)}
  75%{transform:rotateY(4deg) rotateX(-3deg)}
  100%{transform:rotateY(-28deg) rotateX(14deg)}}

/* 3D LOGO */
.logo-3d-wrap{perspective:500px;perspective-origin:50% 50%;margin-bottom:4px;display:flex;justify-content:center}
.logo-eco{display:inline-block;font-family:'Space Mono',monospace;font-size:5.8rem;font-weight:700;
  letter-spacing:24px;padding-right:24px;color:#bae6fd;animation:eco-rotate 10s ease-in-out infinite;
  text-shadow:0 0 30px rgba(56,189,248,1),0 0 70px rgba(56,189,248,0.6),0 0 120px rgba(56,189,248,0.25),
    1px 1px 0 #40aad8,2px 2px 0 #3596c5,3px 3px 0 #2a82b2,4px 4px 0 #1f6e9f,
    5px 5px 0 #145a8c,6px 6px 0 #094679,7px 7px 0 #033266,8px 8px 0 #001e53,
    9px 9px 0 #000a40,10px 10px 14px rgba(0,0,30,0.9)}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;justify-content:center;align-items:center;
  background:radial-gradient(ellipse at 30% 40%,rgba(56,189,248,0.07) 0%,transparent 55%),
  radial-gradient(ellipse at 70% 70%,rgba(244,114,182,0.04) 0%,transparent 50%)}
.login-card{text-align:center;padding:44px 36px 32px;background:rgba(15,23,42,0.88);
  border-radius:28px;border:1px solid var(--border);backdrop-filter:blur(24px);
  width:92%;max-width:420px;animation:fadeInUp .9s ease-out;
  box-shadow:0 0 80px rgba(56,189,248,0.06),0 40px 80px rgba(0,0,0,0.5)}
.tagline{color:#475569;letter-spacing:6px;font-size:.72rem;margin:4px 0 6px;text-transform:uppercase;font-weight:600}
.version-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:.6rem;color:#38bdf8;
  border:1px solid rgba(56,189,248,0.3);padding:2px 10px;border-radius:20px;margin-bottom:24px;letter-spacing:2px}
.section-label{font-size:.6rem;letter-spacing:3px;color:#475569;text-transform:uppercase;margin-bottom:8px;text-align:left}
.login-input{width:100%;padding:14px 18px;margin-bottom:6px;border-radius:14px;
  border:1px solid rgba(56,189,248,0.18);background:rgba(2,6,23,0.7);color:#e2e8f0;
  text-align:center;font-size:1rem;font-family:'Outfit',sans-serif;outline:none;
  transition:border-color .3s,box-shadow .3s}
.login-input:focus{border-color:rgba(56,189,248,0.5);box-shadow:0 0 20px rgba(56,189,248,0.1)}

/* DIFFICULTY */
.diff-row{display:flex;gap:6px;margin:18px 0 20px}
.diff-card{flex:1;padding:10px 4px 8px;border-radius:12px;border:1px solid rgba(56,189,248,0.08);
  background:rgba(2,6,23,0.5);cursor:pointer;text-align:center;transition:all .25s}
.diff-card:hover{border-color:rgba(56,189,248,0.25);background:rgba(56,189,248,0.06)}
.diff-card.active{border-color:var(--sky);background:rgba(56,189,248,0.12);box-shadow:0 0 18px rgba(56,189,248,0.18)}
.diff-icon{font-size:1.3rem;line-height:1;margin-bottom:4px}
.diff-name{font-size:.6rem;color:#64748b;letter-spacing:1px;text-transform:uppercase;font-weight:600;line-height:1}
.diff-card.active .diff-name{color:var(--sky)}

.login-btn{background:linear-gradient(135deg,#38bdf8,#0ea5e9);border:none;padding:15px 30px;
  border-radius:14px;font-weight:700;cursor:pointer;width:100%;color:#020617;font-size:1rem;
  font-family:'Outfit',sans-serif;transition:transform .2s,box-shadow .3s;
  box-shadow:0 4px 24px rgba(56,189,248,0.35);letter-spacing:.5px}
.login-btn:active{transform:scale(.97)}
.hint-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:8px}
.hint{font-size:.68rem;color:#334155;font-style:italic}
.learn-link{font-size:.72rem;color:#38bdf8;cursor:pointer;border:1px solid rgba(56,189,248,0.3);
  padding:5px 12px;border-radius:8px;transition:all .2s;font-family:'Space Mono',monospace;letter-spacing:.5px;white-space:nowrap}
.learn-link:hover{background:rgba(56,189,248,0.1)}

/* ECO LOVE BUTTON */
.eco-love-btn{width:100%;margin-top:14px;padding:13px;border-radius:16px;
  background:linear-gradient(135deg,rgba(244,114,182,0.12),rgba(244,114,182,0.06));
  border:1px solid rgba(244,114,182,0.3);cursor:pointer;font-family:'Space Mono',monospace;
  font-size:.78rem;color:#f472b6;letter-spacing:2px;transition:all .3s;
  animation:lovePulse 3s ease-in-out infinite;
  box-shadow:0 0 20px rgba(244,114,182,0.08)}
.eco-love-btn:hover{background:linear-gradient(135deg,rgba(244,114,182,0.22),rgba(244,114,182,0.12));
  box-shadow:0 0 30px rgba(244,114,182,0.2);transform:scale(1.01)}
.eco-love-btn:active{transform:scale(.98)}

/* LOVE MODAL */
.love-overlay{position:fixed;inset:0;background:rgba(2,6,23,0.95);display:flex;
  justify-content:center;align-items:center;z-index:3000;backdrop-filter:blur(16px)}
.love-card{text-align:center;padding:50px 44px;background:rgba(15,23,42,0.98);
  border-radius:28px;border:1px solid rgba(244,114,182,0.3);animation:fadeInScale .7s ease-out;
  max-width:88%;width:400px;box-shadow:0 0 80px rgba(244,114,182,0.1),0 0 200px rgba(244,114,182,0.05);
  position:relative;overflow:hidden}
.love-card::before{content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(244,114,182,0.08) 0%,transparent 60%);
  pointer-events:none}
.love-rose{font-size:3.5rem;margin-bottom:18px;animation:lovePulse 2s ease-in-out infinite}
.love-to{font-family:'Space Mono',monospace;font-size:.65rem;color:rgba(244,114,182,0.6);
  letter-spacing:5px;text-transform:uppercase;margin-bottom:20px}
.love-text{font-size:1.05rem;color:#f1e0f0;line-height:1.9;font-weight:300;margin-bottom:28px}
.love-text em{font-style:normal;color:#f472b6;font-weight:600}
.love-sign{font-family:'Space Mono',monospace;font-size:.7rem;color:rgba(244,114,182,0.5);
  letter-spacing:3px;margin-bottom:24px}
.love-close{background:rgba(244,114,182,0.15);border:1px solid rgba(244,114,182,0.4);
  color:#f472b6;padding:10px 28px;border-radius:12px;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;transition:all .2s}
.love-close:hover{background:rgba(244,114,182,0.25)}
.love-heart-particle{position:fixed;pointer-events:none;z-index:3001;font-size:1.5rem;animation:heartFloat 4s ease-in forwards}

/* GAME LAYOUT */
.app-container{min-height:100vh;padding:12px;display:flex;justify-content:center;
  align-items:flex-start;background:radial-gradient(ellipse at 30% 50%,rgba(56,189,248,0.04) 0%,transparent 50%)}
.layout{display:flex;gap:20px;width:100%;max-width:1100px;padding-top:10px}
.board-section{flex:2;display:flex;flex-direction:column;align-items:center;gap:6px}

/* CONTROLS */
.board-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
.view-toggle{display:flex;background:rgba(15,23,42,0.8);border:1px solid rgba(30,41,59,0.8);border-radius:10px;overflow:hidden}
.view-btn{padding:7px 16px;cursor:pointer;font-family:'Space Mono',monospace;font-size:.7rem;
  color:#64748b;background:transparent;border:none;transition:all .2s;letter-spacing:1px}
.view-btn.active{background:rgba(56,189,248,0.15);color:var(--sky)}
.learn-btn-game{padding:7px 14px;cursor:pointer;font-family:'Space Mono',monospace;font-size:.7rem;
  color:#64748b;background:rgba(15,23,42,0.8);border:1px solid rgba(30,41,59,0.8);
  border-radius:10px;transition:all .2s}
.learn-btn-game:hover{color:var(--sky);border-color:rgba(56,189,248,0.3)}
.diff-badge{padding:5px 12px;font-size:.6rem;font-family:'Space Mono',monospace;
  letter-spacing:1px;color:#64748b;background:rgba(15,23,42,0.6);border:1px solid rgba(30,41,59,0.6);border-radius:8px}
.eco-btn-game{padding:7px 14px;cursor:pointer;font-family:'Space Mono',monospace;font-size:.7rem;
  color:#f472b6;background:rgba(244,114,182,0.08);border:1px solid rgba(244,114,182,0.25);
  border-radius:10px;transition:all .2s;animation:lovePulse 3s ease-in-out infinite}
.eco-btn-game:hover{background:rgba(244,114,182,0.18)}

.board-outer{animation:pulseGlow 4s ease-in-out infinite;border-radius:10px;overflow:hidden;border:2px solid rgba(56,189,248,0.15)}
.board-grid{display:grid;grid-template-columns:repeat(8,1fr)}
.board-3d-wrap{border-radius:10px;overflow:hidden;border:2px solid rgba(56,189,248,0.15);animation:pulseGlow 4s ease-in-out infinite}

/* TIMER */
.timer{font-family:'Space Mono',monospace;font-size:1.8rem;padding:5px 20px;border-radius:12px;
  background:rgba(15,23,42,0.8);display:flex;align-items:center;gap:10px}
.timer-label{font-size:.6rem;opacity:.5;letter-spacing:3px;font-weight:400}
.timer-josulo{color:#f472b6;border:1px solid rgba(244,114,182,0.2)}
.timer-eco{color:var(--sky);border:1px solid rgba(56,189,248,0.2)}
.timer-active{animation:blink 1.5s ease-in-out infinite}
.status-bar{min-height:28px;color:#94a3b8;font-style:italic;font-size:.9rem;text-align:center;letter-spacing:.5px}

/* 2D BOARD CELLS */
.cell{display:flex;justify-content:center;align-items:center;position:relative;user-select:none;
  -webkit-user-select:none;-webkit-tap-highlight-color:transparent;transition:background .15s}
.cell-light{background:#334155}.cell-dark{background:#1e293b}
.cell-selected{background:rgba(56,189,248,0.42)!important}
.cell-lastmove-light{background:rgba(250,204,21,0.22)!important}
.cell-lastmove-dark{background:rgba(250,204,21,0.16)!important}
.cell .piece{line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));z-index:2;pointer-events:none}
.legal-dot{position:absolute;width:28%;height:28%;border-radius:50%;background:rgba(56,189,248,0.35);pointer-events:none}
.legal-capture{position:absolute;width:85%;height:85%;border-radius:50%;border:3px solid rgba(56,189,248,0.4);pointer-events:none}
.coord{position:absolute;font-size:.5rem;font-family:'Space Mono',monospace;color:rgba(148,163,184,0.35);pointer-events:none;font-weight:700}
.coord-rank{top:1px;left:3px}.coord-file{bottom:1px;right:3px}

/* CHAT */
.chat-section{flex:1;background:rgba(15,23,42,0.8);border-radius:20px;display:flex;
  flex-direction:column;border:1px solid rgba(30,41,59,0.8);backdrop-filter:blur(10px);
  min-width:240px;max-height:calc(100vh - 40px)}
.chat-header{padding:14px;border-bottom:1px solid #1e293b;color:var(--sky);letter-spacing:3px;
  font-weight:600;text-align:center;font-size:.75rem;font-family:'Space Mono',monospace}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px}
.msg{padding:8px 12px;border-radius:12px;font-size:.82rem;line-height:1.5;animation:slideIn .3s ease-out}
.msg-josulo{background:rgba(244,114,182,0.1);border-left:3px solid #f472b6}
.msg-eco{background:rgba(56,189,248,0.1);border-left:3px solid #38bdf8}
.msg-sistema{background:rgba(100,116,139,0.1);border-left:3px solid #475569}
.msg-sender{font-weight:600;font-size:.65rem;letter-spacing:1px;margin-bottom:2px}
.msg-sender-josulo{color:#f472b6}.msg-sender-eco{color:var(--sky)}.msg-sender-sistema{color:#64748b}
.chat-input-area{padding:10px;border-top:1px solid #1e293b;display:flex;gap:8px}
.chat-input{flex:1;background:rgba(2,6,23,0.6);border:1px solid rgba(30,41,59,0.8);padding:11px 14px;
  color:#e2e8f0;border-radius:12px;font-size:.82rem;font-family:'Outfit',sans-serif;outline:none;transition:border-color .3s}
.chat-input:focus{border-color:rgba(56,189,248,0.4)}
.send-btn{background:rgba(56,189,248,0.15);border:1px solid rgba(56,189,248,0.3);color:var(--sky);
  border-radius:12px;padding:0 16px;cursor:pointer;font-size:.9rem;transition:background .2s}
.send-btn:active{background:rgba(56,189,248,0.3)}

/* END OVERLAY */
.end-overlay{position:fixed;inset:0;background:rgba(2,6,23,0.88);display:flex;justify-content:center;
  align-items:center;z-index:1000;backdrop-filter:blur(8px)}
.end-card{text-align:center;padding:45px 50px;background:rgba(15,23,42,0.95);border-radius:28px;
  border:1px solid rgba(56,189,248,0.2);animation:fadeInScale .6s ease-out;max-width:90%}
.end-card h2{color:var(--sky);font-family:'Space Mono',monospace;margin:0 0 8px}
.end-card .sub{color:#94a3b8;margin:0 0 8px}.end-card .stats{color:#475569;font-size:.78rem}
.restart-btn{background:linear-gradient(135deg,#38bdf8,#0ea5e9);border:none;padding:14px 40px;
  border-radius:14px;font-weight:700;cursor:pointer;color:#020617;font-size:1rem;
  font-family:'Outfit',sans-serif;margin-top:18px;box-shadow:0 4px 20px rgba(56,189,248,0.3);transition:transform .2s}
.restart-btn:active{transform:scale(.97)}

/* LEARN MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(2,6,23,0.92);display:flex;
  justify-content:center;align-items:center;z-index:2000;backdrop-filter:blur(10px);padding:16px}
.modal-card{background:rgba(15,23,42,0.98);border-radius:24px;border:1px solid rgba(56,189,248,0.2);
  width:100%;max-width:560px;max-height:85vh;display:flex;flex-direction:column;animation:fadeInScale .4s ease-out}
.modal-header{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:'Space Mono',monospace;color:var(--sky);font-size:1rem;letter-spacing:2px}
.modal-close{background:none;border:1px solid rgba(30,41,59,0.8);color:#64748b;cursor:pointer;
  width:32px;height:32px;border-radius:8px;font-size:1rem;transition:all .2s}
.modal-close:hover{color:var(--sky);border-color:rgba(56,189,248,0.4)}
.modal-tabs{display:flex;padding:16px 24px 0;border-bottom:1px solid #1e293b}
.tab-btn{padding:9px 16px;cursor:pointer;font-family:'Space Mono',monospace;font-size:.68rem;
  color:#64748b;background:transparent;border:none;border-bottom:2px solid transparent;
  transition:all .2s;letter-spacing:.5px;margin-bottom:-1px}
.tab-btn.active{color:var(--sky);border-bottom-color:var(--sky)}
.modal-body{flex:1;overflow-y:auto;padding:20px 24px}
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px}
.pieces-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.piece-card{background:rgba(2,6,23,0.5);border:1px solid rgba(30,41,59,0.8);border-radius:14px;padding:14px;display:flex;gap:12px;align-items:center}
.piece-diagram{display:grid;grid-template-columns:repeat(5,18px);grid-template-rows:repeat(5,18px);gap:1px;flex-shrink:0}
.pd-sq{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px}
.pd-dark{background:rgba(30,41,59,0.7)}.pd-light{background:rgba(51,65,85,0.5)}
.pd-piece{background:rgba(56,189,248,0.6)!important;font-size:12px}
.pd-move{background:rgba(56,189,248,0.25)!important}.pd-capture{background:rgba(244,114,182,0.25)!important}
.piece-info h4{font-size:.85rem;color:#e2e8f0;margin-bottom:4px;font-weight:600}
.piece-info p{font-size:.72rem;color:#94a3b8;line-height:1.5}
.rule-block{margin-bottom:14px;background:rgba(2,6,23,0.4);border-radius:12px;padding:14px;border-left:3px solid rgba(56,189,248,0.3)}
.rule-title{font-weight:700;color:var(--sky);font-size:.85rem;margin-bottom:5px}
.rule-text{font-size:.78rem;color:#94a3b8;line-height:1.6}
.tip{display:flex;gap:10px;padding:12px;background:rgba(2,6,23,0.4);border-radius:12px;margin-bottom:10px}
.tip-num{color:var(--sky);font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;min-width:24px}
.tip-text{font-size:.78rem;color:#94a3b8;line-height:1.6}

/* RESPONSIVE */
@media(max-width:900px){
  .layout{flex-direction:column;align-items:center;gap:12px}
  .chat-section{width:100%;max-height:260px;min-height:180px}
  .timer{font-size:1.4rem}
  .logo-eco{font-size:4rem;letter-spacing:16px}}
@media(max-width:500px){
  .login-card{padding:36px 20px 26px}
  .logo-eco{font-size:3.2rem;letter-spacing:12px;padding-right:12px}
  .diff-name{font-size:.55rem}
  .pieces-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<div id="confetti-container" style="position:fixed;inset:0;pointer-events:none;z-index:9999"></div>
