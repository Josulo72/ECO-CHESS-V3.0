<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ECO CHESS V3.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #05070c;
  --cyan: #00f0ff;
  --pink: #ff2d8a;
  --gold: #ffd700;
  --txt: #e8eaf0;
  --muted: #5a6384;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: 'Rajdhani', sans-serif;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  touch-action: manipulation;
}

body { display: flex; flex-direction: column; align-items: center; min-height: 100dvh; }

.app { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 4px; padding-bottom: 10px; animation: fadeIn 0.8s; }
@keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }

/* HEADER */
.header { width: 100%; max-width: 500px; padding: 14px 16px 4px; z-index: 20; }

.brand { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 4px; }

.crown { font-size: 22px; filter: drop-shadow(0 0 8px rgba(0,240,255,0.6)); animation: crownF 3s ease-in-out infinite; }
@keyframes crownF { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

.logo {
  font-family: 'Orbitron', monospace; font-weight: 900; font-size: 32px; letter-spacing: 8px;
  background: linear-gradient(90deg, var(--cyan), #fff, var(--pink));
  background-size: 300% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: shine 3s linear infinite;
}
@keyframes shine { 0% { background-position: 0%; } 100% { background-position: 300%; } }

.sub { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 5px; color: var(--muted); text-align: center; text-transform: uppercase; }

.hline { width: 60%; height: 1px; margin: 8px auto; background: linear-gradient(90deg, transparent, var(--cyan), var(--pink), transparent); opacity: 0.5; }

/* CONTROLS */
.ctrls { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; z-index: 20; }

.cb {
  font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px;
  padding: 5px 12px; border: 1px solid rgba(255,255,255,0.07); border-radius: 6px;
  background: rgba(255,255,255,0.03); color: var(--muted); cursor: pointer; transition: all 0.3s; text-transform: uppercase;
}
.cb.on { background: rgba(0,240,255,0.1); border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 12px rgba(0,240,255,0.2); }
.cb.eco { border-color: rgba(255,45,138,0.3); color: var(--pink); }

/* PLAYERS */
.pbar {
  display: flex; align-items: center; justify-content: space-between;
  width: 92%; max-width: 440px; padding: 6px 14px; border-radius: 10px;
  background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); z-index: 20;
}
.pi { display: flex; align-items: center; gap: 8px; }
.pa {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; font-family: 'Orbitron', monospace;
}
.tp .pa { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,165,0,0.08)); border: 1px solid rgba(255,215,0,0.25); color: var(--gold); }
.bp .pa { background: linear-gradient(135deg, rgba(0,240,255,0.15), rgba(0,200,255,0.08)); border: 1px solid rgba(0,240,255,0.25); color: var(--cyan); }
.pn { font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; }
.tp .pn { color: var(--gold); }
.bp .pn { color: var(--cyan); }
.tm {
  font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 700;
  letter-spacing: 2px; padding: 3px 10px; border-radius: 6px;
}
.tp .tm { color: var(--gold); background: rgba(255,215,0,0.05); border: 1px solid rgba(255,215,0,0.12); }
.bp .tm { color: var(--cyan); background: rgba(0,240,255,0.05); border: 1px solid rgba(0,240,255,0.12); text-shadow: 0 0 8px rgba(0,240,255,0.4); }

.turn { text-align: center; font-size: 13px; letter-spacing: 2px; color: var(--cyan); padding: 4px 0; z-index: 20; animation: tp 2s ease-in-out infinite; }
@keyframes tp { 0%,100% { opacity: 0.6; } 50% { opacity: 1; text-shadow: 0 0 10px rgba(0,240,255,0.4); } }

#chessCanvas { width: 100% !important; max-width: 460px; aspect-ratio: 1 / 0.8; display: block; z-index: 10; touch-action: none; }

.hint { text-align: center; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--muted); opacity: 0.5; z-index: 20; }

.mp {
  width: 92%; max-width: 440px; padding: 8px 14px;
  background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
  border-radius: 10px; z-index: 20; margin-bottom: 12px;
}
.mt { font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 4px; color: var(--muted); text-align: center; margin-bottom: 6px; }
.ms { padding: 6px 10px; border-radius: 6px; background: rgba(255,255,255,0.02); border-left: 2px solid var(--cyan); }
.ml { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
.mx { font-size: 12px; }

@media (max-width: 400px) { .logo { font-size: 24px; letter-spacing: 5px; } .tm { font-size: 17px; } }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand"><span class="crown">♛</span><span class="logo">ECO</span></div>
    <div class="sub">chess experience · v3.0</div>
    <div class="hline"></div>
  </header>

  <div class="ctrls">
    <button class="cb" id="b2d" onclick="togView(false)">2D</button>
    <button class="cb on" id="b3d" onclick="togView(true)">3D</button>
    <button class="cb">😊 Casual</button>
    <button class="cb">📖</button>
    <button class="cb eco">ECO ♥</button>
  </div>

  <div class="pbar tp">
    <div class="pi"><div class="pa">J</div><span class="pn">Josulo</span></div>
    <div class="tm" id="tT">10:00</div>
  </div>

  <div class="turn">Tu turno, ECO ♟</div>
  <canvas id="chessCanvas"></canvas>
  <div class="hint">↻ ARRASTRA PARA ROTAR</div>

  <div class="pbar bp">
    <div class="pi"><div class="pa">E</div><span class="pn">ECO</span></div>
    <div class="tm" id="tB">9:47</div>
  </div>

  <div class="mp">
    <div class="mt">MENSAJES</div>
    <div class="ms"><div class="ml">Sistema</div><div class="mx">Bienvenid@ al tablero · 😊 Casual</div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
//  ECO CHESS 3D — THREE.JS ENGINE
// ============================================================

let scene, camera, renderer, boardGroup, piecesGroup;
let isDrag = false, prev = {x:0,y:0};
let camA = Math.PI * 0.75, camP = Math.PI * 0.3, camR = 16;
let tA = camA, tP = camP;

const canvas = document.getElementById('chessCanvas');
const SQ = 1.05;
const FEN = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR';

// Piece lathe profiles (x=radius, y=height)
function mkProfile(type) {
  const P = {
    pawn: [[0,.0],[.34,.0],[.36,.04],[.30,.12],[.24,.22],[.20,.38],[.26,.42],[.26,.48],[.18,.58],[.14,.72],[.10,.80],[.14,.84],[.10,.94],[.06,1.0],[0,1.02]],
    rook: [[0,.0],[.36,.0],[.36,.06],[.28,.10],[.24,.15],[.24,.58],[.30,.62],[.30,.72],[.18,.76],[.18,.88],[.30,.88],[.30,.98],[.22,.98],[.22,.92],[.14,.92],[.14,.98],[0,.98]],
    knight: [[0,.0],[.36,.0],[.36,.06],[.28,.10],[.24,.20],[.20,.40],[.18,.55],[.22,.70],[.26,.82],[.22,.95],[.16,1.08],[.10,1.16],[.06,1.20],[0,1.22]],
    bishop: [[0,.0],[.34,.0],[.36,.05],[.28,.10],[.22,.25],[.20,.42],[.22,.55],[.18,.70],[.14,.85],[.10,.98],[.12,1.02],[.08,1.12],[.04,1.22],[.06,1.26],[0,1.30]],
    queen: [[0,.0],[.36,.0],[.38,.05],[.30,.10],[.24,.22],[.22,.40],[.24,.58],[.20,.75],[.16,.90],[.20,.96],[.14,1.08],[.18,1.14],[.10,1.26],[.14,1.32],[.06,1.42],[0,1.46]],
    king: [[0,.0],[.36,.0],[.38,.05],[.30,.10],[.24,.22],[.22,.40],[.24,.58],[.20,.75],[.16,.92],[.14,1.04],[.10,1.16],[.06,1.28],[.04,1.36],[.10,1.36],[.10,1.46],[.04,1.46],[.04,1.58],[.10,1.58],[.10,1.62],[.04,1.62],[.04,1.72],[0,1.72]]
  };
  return (P[type]||P.pawn).map(p => new THREE.Vector2(p[0], p[1]));
}

const PMAP = { P:'pawn',R:'rook',N:'knight',B:'bishop',Q:'queen',K:'king',
               p:'pawn',r:'rook',n:'knight',b:'bishop',q:'queen',k:'king' };

function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050710, 0.018);

  const w = canvas.clientWidth, h = canvas.clientHeight;
  camera = new THREE.PerspectiveCamera(35, w/h, 0.1, 100);

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.outputEncoding = THREE.sRGBEncoding;

  // === LIGHTING ===
  scene.add(new THREE.AmbientLight(0x404060, 0.5));

  const sun = new THREE.DirectionalLight(0xffeedd, 1.4);
  sun.position.set(6, 14, 6);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 1; sun.shadow.camera.far = 35;
  sun.shadow.camera.left = -8; sun.shadow.camera.right = 8;
  sun.shadow.camera.top = 8; sun.shadow.camera.bottom = -8;
  sun.shadow.bias = -0.0005;
  sun.shadow.radius = 3;
  scene.add(sun);

  const rim = new THREE.DirectionalLight(0x00ccff, 0.35);
  rim.position.set(-10, 6, -6);
  scene.add(rim);

  const warm = new THREE.PointLight(0xff8833, 0.3, 25);
  warm.position.set(6, 6, -6);
  scene.add(warm);

  const spot = new THREE.SpotLight(0xffffff, 0.3, 30, Math.PI * 0.4, 0.6);
  spot.position.set(0, 12, 0);
  spot.target.position.set(0, 0, 0);
  scene.add(spot);
  scene.add(spot.target);

  // === FLOOR ===
  const flMat = new THREE.MeshStandardMaterial({ color: 0x06080e, roughness: 0.9, metalness: 0.1 });
  const fl = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), flMat);
  fl.rotation.x = -Math.PI / 2;
  fl.position.y = -0.85;
  fl.receiveShadow = true;
  scene.add(fl);

  buildBoard();
  updateCam();
  loop();
  bindInput();
}

function buildBoard() {
  boardGroup = new THREE.Group();

  // === BOARD BASE (thick wood) ===
  const woodDark = new THREE.MeshStandardMaterial({ color: 0x1a0f06, roughness: 0.45, metalness: 0.25 });
  const woodMid = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.4, metalness: 0.3 });
  const goldTrim = new THREE.MeshStandardMaterial({ color: 0xbb9933, roughness: 0.25, metalness: 0.8 });

  // Main slab
  const slab = new THREE.Mesh(new THREE.BoxGeometry(9.4, 0.7, 9.4), woodDark);
  slab.position.y = -0.45;
  slab.castShadow = true;
  slab.receiveShadow = true;
  boardGroup.add(slab);

  // Upper frame
  const frame = new THREE.Mesh(new THREE.BoxGeometry(9.8, 0.12, 9.8), woodMid);
  frame.position.y = -0.06;
  frame.receiveShadow = true;
  boardGroup.add(frame);

  // Gold trims on edges
  const trimH = new THREE.BoxGeometry(9.9, 0.72, 0.06);
  const trimV = new THREE.BoxGeometry(0.06, 0.72, 9.9);
  [[0,-.42,4.92,trimH],[0,-.42,-4.92,trimH],[4.92,-.42,0,trimV],[-4.92,-.42,0,trimV]].forEach(([x,y,z,g]) => {
    const m = new THREE.Mesh(g, goldTrim);
    m.position.set(x,y,z);
    boardGroup.add(m);
  });

  // === SQUARES ===
  const lMat = new THREE.MeshStandardMaterial({ color: 0xd4a84b, roughness: 0.4, metalness: 0.08 });
  const dMat = new THREE.MeshStandardMaterial({ color: 0x6b3a1f, roughness: 0.5, metalness: 0.12 });
  const sqGeo = new THREE.BoxGeometry(SQ, 0.1, SQ);

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const sq = new THREE.Mesh(sqGeo, (r+c)%2===0 ? lMat : dMat);
      sq.position.set((c-3.5)*SQ, 0, (r-3.5)*SQ);
      sq.receiveShadow = true;
      boardGroup.add(sq);
    }
  }

  // === PIECES ===
  piecesGroup = new THREE.Group();
  const wMat = new THREE.MeshStandardMaterial({ color: 0xf0ead8, roughness: 0.28, metalness: 0.12 });
  const bMat = new THREE.MeshStandardMaterial({ color: 0x181818, roughness: 0.35, metalness: 0.35 });

  const rows = FEN.split('/');
  const scaleMap = { pawn:0.55, rook:0.55, knight:0.52, bishop:0.50, queen:0.48, king:0.44 };

  for (let r = 0; r < 8; r++) {
    let c = 0;
    for (const ch of rows[r]) {
      if (ch >= '1' && ch <= '8') { c += parseInt(ch); continue; }
      const t = PMAP[ch];
      const isW = ch === ch.toUpperCase();
      const geo = new THREE.LatheGeometry(mkProfile(t), 24);
      const piece = new THREE.Mesh(geo, (isW ? wMat : bMat).clone());
      const s = scaleMap[t] || 0.55;
      piece.scale.set(s, s, s);
      piece.position.set((c-3.5)*SQ, 0.05, (r-3.5)*SQ);
      piece.castShadow = true;
      piece.receiveShadow = true;
      piecesGroup.add(piece);
      c++;
    }
  }

  boardGroup.add(piecesGroup);
  scene.add(boardGroup);
}

function updateCam() {
  const x = camR * Math.sin(camP) * Math.sin(camA);
  const y = camR * Math.cos(camP);
  const z = camR * Math.sin(camP) * Math.cos(camA);
  camera.position.set(x, y, z);
  camera.lookAt(0, -0.2, 0);
}

function loop() {
  requestAnimationFrame(loop);
  camA += (tA - camA) * 0.07;
  camP += (tP - camP) * 0.07;
  if (!isDrag) tA += 0.0008;
  updateCam();
  renderer.render(scene, camera);
}

// === INPUT ===
function bindInput() {
  canvas.addEventListener('mousedown', e => { isDrag = true; prev = {x:e.clientX,y:e.clientY}; });
  window.addEventListener('mousemove', e => {
    if (!isDrag) return;
    tA += (e.clientX - prev.x) * 0.007;
    tP = Math.max(0.12, Math.min(Math.PI*0.48, tP - (e.clientY-prev.y)*0.005));
    prev = {x:e.clientX,y:e.clientY};
  });
  window.addEventListener('mouseup', () => isDrag = false);

  canvas.addEventListener('touchstart', e => { isDrag = true; prev = {x:e.touches[0].clientX,y:e.touches[0].clientY}; }, {passive:true});
  canvas.addEventListener('touchmove', e => {
    if (!isDrag || !e.touches.length) return;
    tA += (e.touches[0].clientX - prev.x) * 0.007;
    tP = Math.max(0.12, Math.min(Math.PI*0.48, tP - (e.touches[0].clientY-prev.y)*0.005));
    prev = {x:e.touches[0].clientX,y:e.touches[0].clientY};
  }, {passive:true});
  canvas.addEventListener('touchend', () => isDrag = false);

  window.addEventListener('resize', () => {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
}

function togView(v) {
  document.getElementById('b3d').classList.toggle('on', v);
  document.getElementById('b2d').classList.toggle('on', !v);
  if (v) { tP = Math.PI * 0.3; tA = Math.PI * 0.75; }
  else { tP = 0.05; }
}

// === TIMERS ===
let tTop = 600, tBot = 587;
setInterval(() => {
  tBot--;
  if (tBot >= 0) document.getElementById('tB').textContent = `${Math.floor(tBot/60)}:${(tBot%60).toString().padStart(2,'0')}`;
}, 1000);

init();
</script>
</body>
</html>
